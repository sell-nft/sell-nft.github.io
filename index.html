<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sell NFT</title>
  <meta name="description" content="Sell NFT lets you list and sell your NFTs for crypto from your own wallet.">
  <link rel="canonical" href="https://sell-nft.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F6F3">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Sell NFT">
  <meta property="og:description" content="Sell NFT lets you list and sell your NFTs for crypto from your own wallet.">
  <meta property="og:url" content="https://sell-nft.github.io/">
  <meta property="og:image" content="https://sell-nft.github.io/favicon.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Sell NFT">
  <meta name="twitter:description" content="Sell NFT lets you list and sell your NFTs for crypto from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://sell-nft.github.io/#website",
        "url": "https://sell-nft.github.io/",
        "name": "Sell NFT",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://sell-nft.github.io/#organization",
        "name": "Sell NFT",
        "url": "https://sell-nft.github.io/",
        "logo": "https://sell-nft.github.io/favicon.png"
      },
      {
        "@type": "WebApplication",
        "@id": "https://sell-nft.github.io/#app",
        "name": "Sell NFT",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://sell-nft.github.io/",
        "inLanguage": "en"
      }
    ]
  }
  </script>

  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="dashboard/" rel="noopener noreferrer" aria-label="Sell NFT home">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>Sell NFT</span>
    </a>
    <nav class="nav" aria-label="Trusted references">
      <a href="https://ethereum.org/nft/" target="_blank" rel="nofollow noopener noreferrer">Ethereum NFTs</a>
      <a href="https://etherscan.io/nfttracker" target="_blank" rel="nofollow noopener noreferrer">Etherscan tracker</a>
      <a href="https://www.coingecko.com/en/nft" target="_blank" rel="nofollow noopener noreferrer">NFT markets</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="dashboard/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-label="Sell NFT">
      <h1>Sell NFT</h1>
      <p class="sub"><strong>Sell NFT</strong> lets you list and sell your NFTs for crypto from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="NFT listing card">
      <div class="nft-tile" aria-hidden="true">
        <span></span>
      </div>
      <div class="listing-row">
        <div class="listing-copy">
          <span class="eyebrow">Listing</span>
          <span class="listing-title">List your NFT for sale</span>
        </div>
        <span class="eth-chip">
          <img src="eth.png" width="22" height="22" alt="ETH">
          <span>ETH</span>
        </span>
      </div>
      <div class="control-row">
        <span class="toggle-label">Wallet listing</span>
        <button class="toggle" type="button" aria-pressed="true" data-toggle>
          <span class="toggle-dot"></span>
        </button>
      </div>
      <a class="primary" href="dashboard/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="foot">Sell NFT &mdash; 2026</footer>

  <script>
  (function(){
    "use strict";
    var button = document.querySelector("[data-toggle]");
    if (!button) return;
    button.addEventListener("click", function(){
      var active = button.getAttribute("aria-pressed") === "true";
      button.setAttribute("aria-pressed", String(!active));
    });
  })();
  </script>
</body>
</html>
